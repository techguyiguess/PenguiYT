<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Player</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      height: 100%;
    }

    video {
      width: 80%;
      max-width: 900px;
      display: block;
      margin: auto;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <video controls>
    <source src="What is PenguinMod.mp4" type="video/mp4">
  </video>

</body>
</html>
